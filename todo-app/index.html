<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办清单</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --surface-hover: #f1f3f5;
      --border: #e9ecef;
      --text: #212529;
      --text-muted: #868e96;
      --text-light: #adb5bd;
      --primary: #4263eb;
      --primary-hover: #3b5bdb;
      --primary-light: #edf2ff;
      --danger: #fa5252;
      --danger-hover: #e03131;
      --danger-light: #fff5f5;
      --success: #2f9e44;
      --warning: #f59f00;
      --warning-light: #fff9db;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html.dark {
      --bg: #0c0c0d;
      --surface: #1a1a1b;
      --surface-hover: #27272a;
      --border: #2d2d2f;
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --text-light: #71717a;
      --primary: #6c8eef;
      --primary-hover: #8aa3f5;
      --primary-light: #1e2330;
      --danger: #ff6b6b;
      --danger-hover: #ff8787;
      --danger-light: #2a1515;
      --success: #51cf66;
      --warning: #ffc078;
      --warning-light: #2a2415;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .theme-toggle {
      width: 40px; height: 40px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .theme-toggle:hover { background: var(--surface-hover); color: var(--text); }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      text-align: center;
    }
    .stat-num { font-size: 22px; font-weight: 700; }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .stat.active .stat-num { color: var(--primary); }
    .stat.done .stat-num { color: var(--success); }
    .stat.high .stat-num { color: var(--danger); }

    /* Add form */
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .add-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-input:focus { border-color: var(--primary); }
    .add-input::placeholder { color: var(--text-light); }

    .priority-select {
      padding: 12px 8px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .priority-select:focus { border-color: var(--primary); }

    .add-btn {
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-sm);
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .add-btn:hover { background: var(--primary-hover); }

    /* Filters */
    .filters {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { color: var(--text); }
    .filter-btn.active {
      background: var(--primary);
      color: #fff;
    }

    /* Todo list */
    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
      transition: all 0.2s;
      animation: slideIn 0.25s ease;
    }
    .todo-item:hover { box-shadow: var(--shadow-lg); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .todo-item.completed { opacity: 0.55; }
    .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-muted); }

    /* Priority bar */
    .priority-bar {
      width: 4px;
      height: 28px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .priority-bar.high { background: var(--danger); }
    .priority-bar.medium { background: var(--warning); }
    .priority-bar.low { background: var(--success); }

    /* Checkbox */
    .checkbox {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: transparent;
    }
    .checkbox:hover { border-color: var(--primary); }
    .todo-item.completed .checkbox {
      background: var(--primary);
      border-color: var(--primary);
    }
    .checkbox svg {
      width: 12px; height: 12px;
      color: #fff;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .todo-item.completed .checkbox svg { opacity: 1; }

    /* Todo text */
    .todo-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
      cursor: pointer;
    }

    /* Todo meta */
    .todo-meta {
      font-size: 12px;
      color: var(--text-light);
      flex-shrink: 0;
    }

    /* Delete button */
    .delete-btn {
      width: 28px; height: 28px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-light);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .delete-btn:hover { background: var(--danger-light); color: var(--danger); }

    /* Edit mode */
    .edit-input {
      flex: 1;
      padding: 6px 10px;
      border: 2px solid var(--primary);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* Clear completed */
    .clear-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .clear-btn {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: var(--danger); }
    .clear-btn:disabled { opacity: 0.4; cursor: default; }

    /* Responsive */
    @media (max-width: 480px) {
      .app { padding: 24px 16px 60px; }
      .header h1 { font-size: 24px; }
      .add-form { flex-wrap: wrap; }
      .add-input { width: 100%; flex: none; }
      .priority-select { flex: 1; }
      .add-btn { flex: 1; }
      .todo-meta { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>待办清单</h1>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">
        <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      </button>
    </div>

    <div class="stats">
      <div class="stat active">
        <div class="stat-num" id="stat-active">0</div>
        <div class="stat-label">进行中</div>
      </div>
      <div class="stat done">
        <div class="stat-num" id="stat-done">0</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat high">
        <div class="stat-num" id="stat-high">0</div>
        <div class="stat-label">高优先</div>
      </div>
    </div>

    <form class="add-form" onsubmit="addTodo(event)">
      <input type="text" class="add-input" id="todo-input" placeholder="添加一个待办事项..." maxlength="200" autofocus>
      <select class="priority-select" id="priority-select">
        <option value="low">低</option>
        <option value="medium" selected>中</option>
        <option value="high">高</option>
      </select>
      <button type="submit" class="add-btn">添加</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" data-filter="active" onclick="setFilter('active')">进行中</button>
      <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">已完成</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>

    <div id="empty-state" class="empty" style="display:none;">
      <div class="empty-icon">📝</div>
      <div class="empty-text">还没有待办事项，添加一个吧</div>
    </div>

    <div class="clear-bar" id="clear-bar" style="display:none;">
      <span id="total-text"></span>
      <button class="clear-btn" id="clear-btn" onclick="clearCompleted()">清除已完成</button>
    </div>
  </div>

  <script>
    // ===== State =====
    let todos = [];
    let filter = 'all';

    // ===== Storage =====
    function load() {
      try {
        const raw = localStorage.getItem('todos');
        todos = raw ? JSON.parse(raw) : [];
      } catch { todos = []; }
    }
    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    // ===== Theme =====
    function loadTheme() {
      const saved = localStorage.getItem('todo-theme');
      const dark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', dark);
      updateThemeIcon(dark);
    }
    function toggleTheme() {
      const dark = !document.documentElement.classList.contains('dark');
      document.documentElement.classList.toggle('dark', dark);
      localStorage.setItem('todo-theme', dark ? 'dark' : 'light');
      updateThemeIcon(dark);
    }
    function updateThemeIcon(dark) {
      const icon = document.getElementById('theme-icon');
      if (dark) {
        icon.innerHTML = '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';
      }
    }

    // ===== Actions =====
    function addTodo(e) {
      e.preventDefault();
      const input = document.getElementById('todo-input');
      const priority = document.getElementById('priority-select').value;
      const text = input.value.trim();
      if (!text) return;

      todos.unshift({
        id: Date.now() + '-' + Math.random().toString(36).slice(2, 6),
        text,
        completed: false,
        priority,
        createdAt: new Date().toISOString()
      });
      save();
      input.value = '';
      render();
    }

    function toggleTodo(id) {
      const t = todos.find(t => t.id === id);
      if (t) { t.completed = !t.completed; save(); render(); }
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function editTodo(id) {
      const item = document.querySelector(`[data-id="${id}"]`);
      if (!item) return;
      const textEl = item.querySelector('.todo-text');
      const oldText = textEl.textContent;
      const input = document.createElement('input');
      input.className = 'edit-input';
      input.value = oldText;
      input.maxLength = 200;
      textEl.replaceWith(input);
      input.focus();
      input.select();

      const finish = (save) => {
        const newText = input.value.trim();
        if (save && newText && newText !== oldText) {
          const t = todos.find(t => t.id === id);
          if (t) { t.text = newText; saveStorage(); }
        }
        render();
      };
      input.addEventListener('blur', () => finish(true));
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); finish(true); }
        if (e.key === 'Escape') { finish(false); }
      });
    }

    function setFilter(f) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === f);
      });
      render();
    }

    function clearCompleted() {
      const count = todos.filter(t => t.completed).length;
      if (!count) return;
      todos = todos.filter(t => !t.completed);
      save();
      render();
    }

    function saveStorage() { localStorage.setItem('todos', JSON.stringify(todos)); }

    // ===== Render =====
    function formatTime(iso) {
      const d = new Date(iso);
      const diff = Date.now() - d.getTime();
      const mins = Math.floor(diff / 60000);
      const hrs = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (mins < 1) return '刚刚';
      if (mins < 60) return mins + '分钟前';
      if (hrs < 24) return hrs + '小时前';
      if (days < 7) return days + '天前';
      return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function render() {
      const list = document.getElementById('todo-list');
      const empty = document.getElementById('empty-state');
      const clearBar = document.getElementById('clear-bar');

      let filtered = todos;
      if (filter === 'active') filtered = todos.filter(t => !t.completed);
      if (filter === 'completed') filtered = todos.filter(t => t.completed);

      list.innerHTML = '';

      if (filtered.length === 0) {
        empty.style.display = 'block';
        empty.querySelector('.empty-text').textContent =
          filter === 'all' ? '还没有待办事项，添加一个吧' :
          filter === 'active' ? '没有进行中的任务' : '还没有完成的任务';
      } else {
        empty.style.display = 'none';
      }

      filtered.forEach(todo => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (todo.completed ? ' completed' : '');
        li.dataset.id = todo.id;
        li.innerHTML = `
          <div class="priority-bar ${todo.priority}"></div>
          <div class="checkbox" onclick="toggleTodo('${todo.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
          <span class="todo-text" ondblclick="editTodo('${todo.id}')">${escapeHtml(todo.text)}</span>
          <span class="todo-meta">${formatTime(todo.createdAt)}</span>
          <button class="delete-btn" onclick="deleteTodo('${todo.id}')" aria-label="删除">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        `;
        list.appendChild(li);
      });

      // Stats
      const active = todos.filter(t => !t.completed).length;
      const done = todos.filter(t => t.completed).length;
      const high = todos.filter(t => t.priority === 'high' && !t.completed).length;
      document.getElementById('stat-active').textContent = active;
      document.getElementById('stat-done').textContent = done;
      document.getElementById('stat-high').textContent = high;

      // Clear bar
      if (todos.length > 0) {
        clearBar.style.display = 'flex';
        document.getElementById('total-text').textContent = `共 ${todos.length} 项`;
        document.getElementById('clear-btn').disabled = done === 0;
      } else {
        clearBar.style.display = 'none';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ===== Init =====
    loadTheme();
    load();
    render();
  </script>
</body>
</html>
